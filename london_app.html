<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>London Tipps</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --london-red: #C8102E;
    --london-blue: #012169;
    --accent: #F5A623;
    --bg: #F8F7F4;
    --card-bg: #FFFFFF;
    --text: #2C2C2C;
    --muted: #757575;
    --border: #E0DDD8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.14);
    --radius: 14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--london-blue) 0%, #1a3a7a 100%);
    color: white;
    padding: 28px 24px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 16px rgba(0,0,0,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .london-eye {
    font-size: 36px;
    line-height: 1;
  }
  header h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header p {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 2px;
  }
  .stats-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .search-wrap input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border-radius: 30px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 15px;
    outline: none;
    transition: background 0.2s;
  }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.55); }
  .search-wrap input:focus { background: rgba(255,255,255,0.22); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.6;
    font-size: 16px;
  }

  /* FILTER TABS */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    border: 2px solid rgba(255,255,255,0.3);
    background: transparent;
    color: rgba(255,255,255,0.8);
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .filter-btn:hover { background: rgba(255,255,255,0.12); }
  .filter-btn.active {
    background: white;
    color: var(--london-blue);
    border-color: white;
  }
  .filter-count {
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 11px;
  }
  .filter-btn.active .filter-count {
    background: rgba(1,33,105,0.12);
  }

  /* MAIN CONTENT */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* VIEW TOGGLES */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .results-count { font-size: 14px; color: var(--muted); font-weight: 500; }
  .view-toggle { display: flex; gap: 6px; }
  .view-btn {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.15s;
    color: var(--muted);
  }
  .view-btn.active { background: var(--london-blue); color: white; border-color: var(--london-blue); }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .cards-grid.list-view {
    grid-template-columns: 1fr;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
  .cards-grid.list-view .card {
    flex-direction: row;
    align-items: stretch;
  }

  .card-color-bar {
    height: 5px;
    width: 100%;
    flex-shrink: 0;
  }
  .cards-grid.list-view .card-color-bar {
    height: auto;
    width: 5px;
  }

  .card-body { padding: 16px; flex: 1; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .card-desc { font-size: 13.5px; color: var(--muted); line-height: 1.55; margin-bottom: 12px; }

  .card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* CATEGORY BADGE */
  .cat-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  /* PRICE TAG */
  .price-tag {
    font-size: 12px;
    font-weight: 700;
    color: var(--london-red);
    background: #FFF0F2;
    border-radius: 10px;
    padding: 3px 9px;
  }

  /* ACTIONS */
  .card-actions { display: flex; gap: 6px; margin-left: auto; }
  .action-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 9px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
  }
  .action-btn:hover { border-color: var(--london-blue); color: var(--london-blue); background: #EEF2FB; }
  .action-btn.fav-active { background: #FFF7E6; border-color: var(--accent); color: var(--accent); }
  .action-btn.visited-active { background: #EDFAF3; border-color: #27AE60; color: #27AE60; }

  /* STATUS BADGES on card */
  .status-badges { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .status-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.3px;
  }
  .pill-fav { background: var(--accent); color: white; }
  .pill-visited { background: #27AE60; color: white; }

  /* HIDDEN GEM NUMBER */
  .gem-number {
    width: 28px;
    height: 28px;
    background: var(--london-blue);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }

  /* Category colors */
  .cat-restaurant { background: #FFF0F2; color: #C8102E; }
  .bar-restaurant { background: #C8102E; }
  .cat-bar { background: #FEF3E2; color: #E67E22; }
  .bar-bar { background: #E67E22; }
  .cat-event { background: #EEF2FB; color: #012169; }
  .bar-event { background: #012169; }
  .cat-gem { background: #F0FDF4; color: #16A34A; }
  .bar-gem { background: #16A34A; }
  .cat-shopping { background: #FDF4FF; color: #9333EA; }
  .bar-shopping { background: #9333EA; }
  .cat-sightseeing { background: #FFF7ED; color: #C2410C; }
  .bar-sightseeing { background: #C2410C; }

  /* SECTION HEADERS */
  .section-header {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
  }

  @media (max-width: 600px) {
    header { padding: 20px 16px 18px; }
    header h1 { font-size: 22px; }
    .cards-grid { grid-template-columns: 1fr; }
  }

  /* UPLOAD BUTTON */
  .upload-btn {
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 22px;
    color: white;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.18s;
    white-space: nowrap;
  }
  .upload-btn:hover { background: rgba(255,255,255,0.28); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 18px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    background: linear-gradient(135deg, var(--london-blue) 0%, #1a3a7a 100%);
    color: white;
    padding: 20px 24px;
    border-radius: 18px 18px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-size: 18px; font-weight: 700; }
  .modal-close {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-body { padding: 24px; }

  /* DROPZONE */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #FAFAFA;
    margin-bottom: 20px;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--london-blue);
    background: #EEF2FB;
  }
  .dropzone-icon { font-size: 36px; margin-bottom: 8px; }
  .dropzone p { color: var(--muted); font-size: 14px; }
  .dropzone b { color: var(--london-blue); }
  .dropzone input[type=file] { display: none; }

  /* PREVIEW IMAGE */
  .preview-img {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 16px;
    display: none;
  }

  /* FORM FIELDS */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: white;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--london-blue);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  /* STATUS LINE */
  .ocr-status {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
    min-height: 18px;
  }
  .ocr-status.loading { color: #E67E22; }
  .ocr-status.done { color: #16A34A; }

  /* MODAL FOOTER */
  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--london-blue); color: var(--london-blue); }
  .btn-save {
    background: var(--london-blue);
    border: none;
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    color: white;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #1a3a7a; }
  .btn-save:disabled { background: var(--border); cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="london-eye">🇬🇧</span>
    <div>
      <h1>London Tipps</h1>
      <p>Meine persönliche Sammlung</p>
    </div>
    <div class="stats-badge" id="statsLabel">40 Tipps</div>
    <button class="upload-btn" onclick="openUploadModal()">📸 + Tipp</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Suchen..." oninput="render()">
  </div>
  <div class="filters" id="filterBar"></div>
</header>

<main>
  <div class="toolbar">
    <div class="results-count" id="resultsCount"></div>
    <div class="view-toggle">
      <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Rasteransicht">⊞</button>
      <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="Listenansicht">☰</button>
    </div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</main>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="uploadModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>📸 Screenshot hinzufügen</h2>
      <button class="modal-close" onclick="closeUploadModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()"
           ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
        <div class="dropzone-icon">🖼️</div>
        <p><b>Klicke hier</b> oder ziehe ein Screenshot-Bild rein</p>
        <p style="margin-top:4px;font-size:12px">JPG, PNG, HEIC – aus Google Fotos oder direkt vom iPhone</p>
      </div>
      <img class="preview-img" id="previewImg" alt="Vorschau">
      <div class="ocr-status" id="ocrStatus"></div>
      <div id="uploadForm" style="display:none">
        <div class="form-group">
          <label>Name des Ortes</label>
          <input type="text" id="fName" placeholder="z.B. Bōkan 39 Rooftop">
        </div>
        <div class="form-group">
          <label>Kategorie</label>
          <select id="fCat">
            <option value="restaurant">🍽️ Essen & Trinken</option>
            <option value="bar">🍸 Bars & Rooftops</option>
            <option value="event">🎭 Erlebnisse</option>
            <option value="gem">💎 Hidden Gems</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="sightseeing">📸 Sightseeing</option>
          </select>
        </div>
        <div class="form-group">
          <label>Unterkategorie <span style="color:var(--muted);font-weight:400">(optional)</span></label>
          <input type="text" id="fSubcat" placeholder="z.B. Rooftop, Brunch, Park…">
        </div>
        <div class="form-group">
          <label>Beschreibung</label>
          <textarea id="fDesc" placeholder="Was macht diesen Ort besonders?"></textarea>
        </div>
        <div class="form-group">
          <label>Preis <span style="color:var(--muted);font-weight:400">(optional)</span></label>
          <input type="text" id="fPrice" placeholder="z.B. £30pp, Kostenlos…">
        </div>
        <div class="form-group">
          <label>Google Maps Suchbegriff</label>
          <input type="text" id="fMaps" placeholder="z.B. Bokan 39 Canary Wharf London">
        </div>
      </div>
    </div>
    <div class="modal-footer" id="modalFooter" style="display:none">
      <button class="btn-cancel" onclick="closeUploadModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveNewTip()">✓ Tipp speichern</button>
    </div>
  </div>
</div>


<script>
// Custom tips added via screenshot upload (persisted in localStorage)
let customTips = JSON.parse(localStorage.getItem("londonCustomTips") || "[]");
function getAllTips() { return [...TIPS, ...customTips]; }

const TIPS = [
  // RESTAURANTS
  { id:1, name:"The Athenaeum", category:"restaurant", subcat:"Afternoon Tea", desc:"Piccadilly – Klassischer Afternoon Tea im eleganten Hotel. Einer der schönsten in London.", price:"£60pp", maps:"The Athenaeum Hotel London Piccadilly", emoji:"🫖" },
  { id:2, name:"The Orangery", category:"restaurant", subcat:"Afternoon Tea", desc:"Kensington Palace – Afternoon Tea im historischen Palastgarten. Märchenhafte Kulisse!", price:"£59pp", maps:"The Orangery Kensington Palace London", emoji:"🌸" },
  { id:3, name:"Dalloway Terrace", category:"restaurant", subcat:"Afternoon Tea", desc:"Bloomsbury – Romantischer Tea im Garten mit toller floraler Deko. Sehr beliebt, Reservierung empfohlen.", price:"£55pp", maps:"Dalloway Terrace Bloomsbury London", emoji:"🌺" },

  // EVENTS
  { id:7, name:"Silent Disco", category:"event", subcat:"Erlebnis", desc:"Natural History Museum – Tanzen mit den Dinosauriern! 3 DJs auf Wireless-Kanälen, Kanal frei wählbar. Absolute Bucket-List!", price:"", maps:"Natural History Museum London", emoji:"🎧" },
  { id:8, name:"Regents Park Open Air Theatre", category:"event", subcat:"Theater", desc:"Magisches Freilichttheater im Regents Park – fühlt sich an wie ein Zaubermärchen. Programm: Sherlock Holmes, A Midsummer Night's Dream, CATS.", price:"", maps:"Regents Park Open Air Theatre London", emoji:"🎭" },

  // HIDDEN GEMS
  { id:9,  name:"JOIA Rooftop Pool", category:"gem", subcat:"Hidden Gem", desc:"Versteckter Rooftop-Pool mit Stadtblick – wenig bekannt, absolutes Geheimtipp.", num:1, maps:"JOIA Rooftop London", emoji:"🏊" },
  { id:10, name:"Upside Down Globe", category:"gem", subcat:"Hidden Gem", desc:"Kurioses Kunstwerk in der City – ein auf dem Kopf stehendes Modell des Globus Theater.", num:2, maps:"Upside Down Globe London", emoji:"🌍" },
  { id:11, name:"London Museum Docklands", category:"gem", subcat:"Hidden Gem", desc:"Faszinierende Geschichte des Londoner Hafens und Handels. Weniger bekannt als das Hauptmuseum.", num:3, maps:"Museum of London Docklands", emoji:"⚓" },
  { id:12, name:"The Rooftop at The Postal Building", category:"gem", subcat:"Hidden Gem", desc:"Einzigartiger Rooftop im historischen Postgebäude in Mount Pleasant.", num:4, maps:"The Postal Building London Rooftop", emoji:"📮" },
  { id:13, name:"Barts", category:"gem", subcat:"Hidden Gem", desc:"Versteckter Cocktailbar – Eingang hinter einem Gemälde. Typisch London!", num:5, maps:"Barts Bar Chelsea London", emoji:"🍸" },
  { id:14, name:"Eel Pie Island", category:"gem", subcat:"Hidden Gem", desc:"Kleine Insel in der Themse bei Twickenham – Künstlerkolonie, nur zu Fuß erreichbar.", num:6, maps:"Eel Pie Island Twickenham", emoji:"🏝️" },
  { id:15, name:"Broccoly Gallery", category:"gem", subcat:"Hidden Gem", desc:"Versteckte Kunstgalerie in East London.", num:7, maps:"Broccoly Gallery London", emoji:"🎨" },
  { id:16, name:"Golders Hill Park Zoo", category:"gem", subcat:"Hidden Gem", desc:"Kleiner kostenloser Zoo im Golders Hill Park – perfekt für Familien, kaum bekannt.", num:8, maps:"Golders Hill Park Zoo London", emoji:"🦜" },
  { id:17, name:"Hampton Court – Henry VIII's Kitchen", category:"gem", subcat:"Hidden Gem", desc:"Die monumentale Küche von Heinrich VIII. im Hampton Court Palace – beeindruckende Geschichte.", num:9, maps:"Hampton Court Palace Kitchen", emoji:"👑" },
  { id:18, name:"Buddhapadipa Temple", category:"gem", subcat:"Hidden Gem", desc:"Wunderschöner Thai-Tempel in Wimbledon mit Gartenanlagen.", num:10, maps:"Buddhapadipa Temple Wimbledon", emoji:"🏯" },

const CATEGORIES = [
  { key:"all",         label:"Alle",          emoji:"🗺️" },
  { key:"restaurant",  label:"Essen & Trinken",emoji:"🍽️" },
  { key:"bar",         label:"Bars & Rooftops",emoji:"🍸" },
  { key:"event",       label:"Erlebnisse",    emoji:"🎭" },
  { key:"gem",         label:"Hidden Gems",   emoji:"💎" },
  { key:"shopping",    label:"Shopping",      emoji:"🛍️" },
  { key:"sightseeing", label:"Sightseeing",   emoji:"📸" },
];

// State
let activeFilter = "all";
let viewMode = "grid";
let favs = JSON.parse(localStorage.getItem("londonFavs") || "[]");
let visited = JSON.parse(localStorage.getItem("londonVisited") || "[]");

function save() {
  localStorage.setItem("londonFavs", JSON.stringify(favs));
  localStorage.setItem("londonVisited", JSON.stringify(visited));
}

function toggleFav(id) {
  favs = favs.includes(id) ? favs.filter(x=>x!==id) : [...favs, id];
  save(); render();
}
function toggleVisited(id) {
  visited = visited.includes(id) ? visited.filter(x=>x!==id) : [...visited, id];
  save(); render();
}

function setFilter(key) { activeFilter = key; render(); }
function setView(v) {
  viewMode = v;
  document.getElementById("gridViewBtn").classList.toggle("active", v==="grid");
  document.getElementById("listViewBtn").classList.toggle("active", v==="list");
  document.getElementById("cardsGrid").classList.toggle("list-view", v==="list");
  render();
}

function getFiltered() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  return getAllTips().filter(t => {
    const matchCat = activeFilter === "all" || t.category === activeFilter;
    const matchQ = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || (t.subcat||"").toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function renderFilters() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = CATEGORIES.map(c => {
    const all = getAllTips();
    const count = c.key === "all" ? all.length : all.filter(t=>t.category===c.key).length;
    return `<button class="filter-btn ${activeFilter===c.key?'active':''}" onclick="setFilter('${c.key}')">
      ${c.emoji} ${c.label} <span class="filter-count">${count}</span>
    </button>`;
  }).join("");
}

function mapsUrl(query) {
  return "https://www.google.com/maps/search/" + encodeURIComponent(query);
}

function cardColor(cat) {
  return { restaurant:"bar-restaurant", bar:"bar-bar", event:"bar-event", gem:"bar-gem", shopping:"bar-shopping", sightseeing:"bar-sightseeing" }[cat] || "bar-event";
}
function badgeColor(cat) {
  return { restaurant:"cat-restaurant", bar:"cat-bar", event:"cat-event", gem:"cat-gem", shopping:"cat-shopping", sightseeing:"cat-sightseeing" }[cat] || "cat-event";
}

function renderCard(t) {
  const isFav = favs.includes(t.id);
  const isVisited = visited.includes(t.id);
  const isListView = viewMode === "list";

  return `<div class="card" id="card-${t.id}">
    <div class="card-color-bar ${cardColor(t.category)}"></div>
    <div class="card-body">
      <div class="status-badges">
        ${isFav ? '<span class="status-pill pill-fav">⭐ Merkliste</span>' : ''}
        ${isVisited ? '<span class="status-pill pill-visited">✓ Besucht</span>' : ''}
      </div>
      <div class="card-header">
        ${t.num ? `<div class="gem-number">${t.num}</div>` : ''}
        <div style="flex:1">
          <div class="card-name">${t.emoji} ${t.name}</div>
        </div>
      </div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-footer">
        <span class="cat-badge ${badgeColor(t.category)}">${t.subcat}</span>
        ${t.price ? `<span class="price-tag">${t.price}</span>` : ''}
        <div class="card-actions">
          <button class="action-btn ${isFav?'fav-active':''}" onclick="toggleFav(${t.id})" title="Merkliste">
            ${isFav ? '⭐' : '☆'}
          </button>
          <button class="action-btn ${isVisited?'visited-active':''}" onclick="toggleVisited(${t.id})" title="Als besucht markieren">
            ${isVisited ? '✓' : '○'}
          </button>
          ${t.maps ? `<a class="action-btn" href="${mapsUrl(t.maps)}" target="_blank" title="Google Maps">📍</a>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function render() {
  renderFilters();
  const filtered = getFiltered();
  const grid = document.getElementById("cardsGrid");
  const count = document.getElementById("resultsCount");
  const statsLabel = document.getElementById("statsLabel");

  statsLabel.textContent = `${favs.length} ⭐  ${visited.length} ✓`;
  count.textContent = `${filtered.length} Tipp${filtered.length!==1?'s':''}`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🔍</div>
      <h3>Keine Treffer</h3>
      <p>Versuche eine andere Suche oder Kategorie</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(renderCard).join("");
}

// Init
renderFilters();
render();

// ─── UPLOAD MODAL ───────────────────────────────────────────────────────────

function openUploadModal() {
  document.getElementById("uploadModal").classList.add("open");
  resetUploadModal();
}
function closeUploadModal() {
  document.getElementById("uploadModal").classList.remove("open");
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById("uploadModal")) closeUploadModal();
}

function resetUploadModal() {
  document.getElementById("previewImg").style.display = "none";
  document.getElementById("uploadForm").style.display = "none";
  document.getElementById("modalFooter").style.display = "none";
  document.getElementById("ocrStatus").textContent = "";
  document.getElementById("ocrStatus").className = "ocr-status";
  document.getElementById("dropzone").style.display = "block";
  document.getElementById("fileInput").value = "";
  ["fName","fSubcat","fDesc","fPrice","fMaps"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("fCat").value = "restaurant";
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById("dropzone").classList.add("drag-over");
}
function handleDragLeave() {
  document.getElementById("dropzone").classList.remove("drag-over");
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById("dropzone").classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) processFile(file);
}
function handleFile(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const src = e.target.result;
    // Show preview
    const img = document.getElementById("previewImg");
    img.src = src;
    img.style.display = "block";
    // Hide dropzone, show form
    document.getElementById("dropzone").style.display = "none";
    document.getElementById("uploadForm").style.display = "block";
    document.getElementById("modalFooter").style.display = "flex";
    // Start OCR
    runOCR(src);
  };
  reader.readAsDataURL(file);
}

function runOCR(imageSrc) {
  const status = document.getElementById("ocrStatus");
  status.textContent = "⏳ Lese Text aus dem Screenshot…";
  status.className = "ocr-status loading";

  // Lazy-load Tesseract
  if (!window.Tesseract) {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload = () => startTesseract(imageSrc);
    document.head.appendChild(s);
  } else {
    startTesseract(imageSrc);
  }
}

function startTesseract(imageSrc) {
  Tesseract.recognize(imageSrc, "eng", { logger: () => {} })
    .then(({ data: { text } }) => {
      applyOCRResult(text);
    })
    .catch(() => {
      const status = document.getElementById("ocrStatus");
      status.textContent = "⚠️ Texterkennung fehlgeschlagen – bitte manuell ausfüllen.";
      status.className = "ocr-status";
    });
}

function applyOCRResult(text) {
  const status = document.getElementById("ocrStatus");
  // Extract the most prominent line (usually the place name – shortest non-noise line)
  const lines = text.split("\n")
    .map(l => l.trim())
    .filter(l => l.length > 2 && l.length < 60)
    .filter(l => !/kommentar|comment|freunde|reels|following|follower|likes|here are/i.test(l));

  const nameLine = lines[0] || "";
  if (nameLine) {
    document.getElementById("fName").value = nameLine;
    document.getElementById("fMaps").value = nameLine + " London";
  }

  // Auto-suggest category from OCR text
  const lower = text.toLowerCase();
  let cat = "sightseeing";
  if (/rooftop|bar|cocktail|pub|drinks|bier|beer/i.test(lower)) cat = "bar";
  else if (/restaurant|café|cafe|brunch|tea|food|essen|kitchen|nurseries|summerhouse/i.test(lower)) cat = "restaurant";
  else if (/disco|theatre|theater|museum|concert|event/i.test(lower)) cat = "event";
  else if (/market|shopping|shop|store|boutique|kaufhaus/i.test(lower)) cat = "shopping";
  else if (/park|bridge|church|docks|dock|garden|square|palace|island/i.test(lower)) cat = "sightseeing";
  else if (/hidden|secret|gem|unknown/i.test(lower)) cat = "gem";
  document.getElementById("fCat").value = cat;

  status.textContent = nameLine
    ? `✅ Text erkannt: „${nameLine}" – bitte prüfen und ergänzen`
    : "✅ Fertig – bitte Name und Details manuell eingeben";
  status.className = "ocr-status done";
}

function saveNewTip() {
  const name = document.getElementById("fName").value.trim();
  if (!name) { alert("Bitte einen Namen eingeben."); return; }

  const newId = 10000 + customTips.length + 1;
  const tip = {
    id: newId,
    name,
    category: document.getElementById("fCat").value,
    subcat: document.getElementById("fSubcat").value.trim() || "Eigener Tipp",
    desc: document.getElementById("fDesc").value.trim() || "",
    price: document.getElementById("fPrice").value.trim(),
    maps: document.getElementById("fMaps").value.trim(),
    emoji: "📍",
    custom: true
  };

  customTips.push(tip);
  localStorage.setItem("londonCustomTips", JSON.stringify(customTips));
  closeUploadModal();
  render();

  // Flash the new card
  setTimeout(() => {
    const el = document.getElementById("card-" + newId);
    if (el) { el.style.outline = "3px solid var(--london-blue)"; setTimeout(() => el.style.outline = "", 2000); }
  }, 100);
}
